<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CIRIS - Secure Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e293b, #0b1120);
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-card {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="text-center mb-4">
            <div class="brand-icon mx-auto mb-3" style="width: 48px; height: 48px; border-radius: 14px;">
                <i class="fas fa-shield-alt text-white fa-lg"></i>
            </div>
            <h1 class="h3 fw-bold mb-1">CIRIS</h1>
            <p class="text-muted small text-uppercase fw-bold tracking-widest">Crime Intelligence System</p>
        </div>

        <div class="login-card glass">
            <h2 class="h5 fw-bold mb-4">Authorized Login</h2>
            
            {% if error %}
            <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--accent-red); color: var(--accent-red); padding: 12px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-exclamation-circle"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login">
                <div class="mb-4">
                    <label class="d-block text-muted small fw-bold mb-2 text-uppercase">Username</label>
                    <input class="form-control-custom" type="text" name="username" placeholder="Enter username" required autofocus />
                </div>

                <div class="mb-4">
                    <label class="d-block text-muted small fw-bold mb-2 text-uppercase">Password</label>
                    <input class="form-control-custom" type="password" name="password" placeholder="••••••••" required />
                </div>

                <button class="btn-primary-custom w-100 py-3" type="submit">
                    <span>Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="mt-4 pt-4 border-top border-secondary text-center">
                <p class="text-muted small mb-0">Demo: admin / admin123</p>
            </div>
        </div>
    </div>
</body>

</html>
